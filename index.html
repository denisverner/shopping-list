<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nákupní seznam</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeede9;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b66;
    --text-tertiary: #a0a09a;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: 'DM Sans', system-ui, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #242422;
      --bg-tertiary: #2e2e2b;
      --text-primary: #f0efe9;
      --text-secondary: #9a9a94;
      --text-tertiary: #6a6a65;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.2);
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }

  .app { max-width: 680px; margin: 0 auto; }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.75rem;
  }
  .header-icon { font-size: 26px; }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }
  .header-sub {
    font-size: 13px;
    color: var(--text-tertiary);
    margin-left: auto;
  }

  .store-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  .tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: var(--bg);
    font-size: 13px;
    font-family: var(--font);
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.15s;
  }
  .tab:hover { background: var(--bg-secondary); }
  .tab.active {
    background: var(--text-primary);
    color: var(--bg);
    border-color: var(--text-primary);
    font-weight: 500;
  }
  .tab .count {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 11px;
    margin-left: 4px;
  }
  .tab:not(.active) .count {
    background: var(--bg-tertiary);
    color: var(--text-secondary);
  }

  .progress-bar {
    height: 2px;
    background: var(--bg-tertiary);
    border-radius: 2px;
    margin-bottom: 1.25rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--text-primary);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .add-row input {
    flex: 1;
    height: 38px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 0 12px;
    font-size: 14px;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s;
  }
  .add-row input:focus { border-color: var(--border-strong); }
  .add-row input::placeholder { color: var(--text-tertiary); }
  .store-select {
    height: 38px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 0 8px;
    font-size: 13px;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    cursor: pointer;
    outline: none;
  }
  .btn-add {
    height: 38px;
    padding: 0 16px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border);
    background: var(--text-primary);
    color: var(--bg);
    font-size: 14px;
    font-family: var(--font);
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .btn-add:hover { opacity: 0.85; }

  .section-label {
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 6px;
    margin-top: 1.25rem;
  }

  .item-list { display: flex; flex-direction: column; gap: 1px; }

  .item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: var(--radius-md);
    border: 0.5px solid transparent;
    transition: background 0.1s;
    cursor: default;
  }
  .item:hover {
    background: var(--bg-secondary);
    border-color: var(--border);
  }
  .item:hover .btn-del { opacity: 1; }
  .item.checked { opacity: 0.4; }
  .item.checked .item-name { text-decoration: line-through; color: var(--text-tertiary); }

  .item input[type=checkbox] {
    width: 16px; height: 16px;
    cursor: pointer;
    flex-shrink: 0;
    accent-color: var(--text-primary);
  }
  .item-name { flex: 1; font-size: 14px; color: var(--text-primary); }
  .item-store {
    font-size: 11px;
    color: var(--text-tertiary);
    background: var(--bg-tertiary);
    padding: 2px 7px;
    border-radius: 10px;
  }
  .btn-fav {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 15px;
    padding: 2px 3px;
    color: var(--text-tertiary);
    transition: color 0.15s;
    line-height: 1;
  }
  .btn-fav:hover, .btn-fav.active { color: #e6a817; }
  .btn-del {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 13px;
    padding: 2px 3px;
    color: var(--text-tertiary);
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    line-height: 1;
  }
  .btn-del:hover { color: #e24b4a; }

  .fav-add-btn {
    font-size: 12px;
    padding: 3px 10px;
    height: auto;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-family: var(--font);
    cursor: pointer;
    white-space: nowrap;
  }
  .fav-add-btn:hover { background: var(--bg-secondary); }
  .fav-add-btn:disabled { opacity: 0.35; cursor: default; }

  .empty {
    text-align: center;
    padding: 2.5rem;
    color: var(--text-tertiary);
    font-size: 14px;
  }

  .footer-actions {
    display: flex;
    gap: 8px;
    margin-top: 1.5rem;
    justify-content: flex-end;
  }
  .btn-sm {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    color: var(--text-secondary);
    font-family: var(--font);
    transition: background 0.15s;
  }
  .btn-sm:hover { background: var(--bg-secondary); }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">
  <div class="header">
    <span class="header-icon">🛒</span>
    <h1>Nákupní seznam</h1>
    <span class="header-sub" id="headerSub"></span>
  </div>

  <div class="store-tabs" id="tabs"></div>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <div class="add-row">
    <input type="text" id="newItem" placeholder="Přidat položku..." />
    <select class="store-select" id="storeSelect"></select>
    <button class="btn-add" onclick="addItem()">+ Přidat</button>
  </div>

  <div id="favSection" style="display:none">
    <div class="section-label">Oblíbené</div>
    <div class="item-list" id="favList"></div>
  </div>

  <div class="section-label">Seznam</div>
  <div class="item-list" id="itemList"></div>
  <div class="empty" id="emptyMsg" style="display:none">Žádné položky. Přidej první nákup! 🥦</div>

  <div class="footer-actions">
    <button class="btn-sm" onclick="clearChecked()">Smazat zaškrtnuté</button>
    <button class="btn-sm" onclick="uncheckAll()">Odznačit vše</button>
  </div>
</div>

<script>
const STORES = ['Vše', 'Lidl', 'Biedronka', 'Albert', 'Tesco', 'Kaufland'];

let state = { items: [], favorites: [], activeStore: 'Vše' };

function loadState() {
  try {
    const raw = localStorage.getItem('shopping_state');
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
  render();
}

function saveState() {
  try { localStorage.setItem('shopping_state', JSON.stringify(state)); } catch(e) {}
}

function addItem() {
  const input = document.getElementById('newItem');
  const store = document.getElementById('storeSelect').value;
  const name = input.value.trim();
  if (!name) return;
  state.items.push({ id: Date.now(), name, store, checked: false });
  input.value = '';
  saveState(); render();
}

document.getElementById('newItem').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItem();
});

function toggleCheck(id) {
  const item = state.items.find(i => i.id === id);
  if (item) { item.checked = !item.checked; saveState(); render(); }
}

function deleteItem(id) {
  state.items = state.items.filter(i => i.id !== id);
  saveState(); render();
}

function toggleFav(name, store) {
  const idx = state.favorites.findIndex(f => f.name === name);
  if (idx >= 0) state.favorites.splice(idx, 1);
  else state.favorites.push({ name, store });
  saveState(); render();
}

function addFavToList(name, store) {
  const exists = state.items.find(i => i.name === name && !i.checked);
  if (!exists) {
    state.items.push({ id: Date.now(), name, store, checked: false });
    saveState(); render();
  }
}

function clearChecked() {
  state.items = state.items.filter(i => !i.checked);
  saveState(); render();
}

function uncheckAll() {
  state.items.forEach(i => i.checked = false);
  saveState(); render();
}

function setStore(store) {
  state.activeStore = store;
  render();
}

function getVisible() {
  if (state.activeStore === 'Vše') return state.items;
  return state.items.filter(i => i.store === state.activeStore);
}

function esc(str) { return str.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function render() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = STORES.map(s => {
    const cnt = s === 'Vše'
      ? state.items.filter(i => !i.checked).length
      : state.items.filter(i => i.store === s && !i.checked).length;
    const countBadge = cnt > 0 ? `<span class="count">${cnt}</span>` : '';
    return `<button class="tab${state.activeStore === s ? ' active' : ''}" onclick="setStore('${s}')">${s}${countBadge}</button>`;
  }).join('');

  const sel = document.getElementById('storeSelect');
  const currentStore = state.activeStore !== 'Vše' ? state.activeStore : 'Lidl';
  sel.innerHTML = STORES.slice(1).map(s =>
    `<option value="${s}"${s === currentStore ? ' selected' : ''}>${s}</option>`
  ).join('');

  const visible = getVisible();
  const total = visible.length;
  const checked = visible.filter(i => i.checked).length;
  const pct = total > 0 ? Math.round((checked / total) * 100) : 0;
  document.getElementById('progress').style.width = pct + '%';

  const sub = document.getElementById('headerSub');
  sub.textContent = total > 0 ? `${checked}/${total} hotovo` : '';

  const listEl = document.getElementById('itemList');
  const sorted = [...visible].sort((a, b) => a.checked - b.checked);
  listEl.innerHTML = sorted.map(item => {
    const isFav = state.favorites.some(f => f.name === item.name);
    return `<div class="item${item.checked ? ' checked' : ''}">
      <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleCheck(${item.id})">
      <span class="item-name">${item.name}</span>
      ${state.activeStore === 'Vše' ? `<span class="item-store">${item.store}</span>` : ''}
      <button class="btn-fav${isFav ? ' active' : ''}" onclick="toggleFav('${esc(item.name)}','${item.store}')" title="Oblíbené">★</button>
      <button class="btn-del" onclick="deleteItem(${item.id})" title="Smazat">✕</button>
    </div>`;
  }).join('');

  document.getElementById('emptyMsg').style.display = sorted.length === 0 ? 'block' : 'none';

  const favSection = document.getElementById('favSection');
  const favList = document.getElementById('favList');
  const relevantFavs = state.activeStore === 'Vše'
    ? state.favorites
    : state.favorites.filter(f => f.store === state.activeStore);

  if (relevantFavs.length > 0) {
    favSection.style.display = 'block';
    favList.innerHTML = relevantFavs.map(f => {
      const inList = state.items.some(i => i.name === f.name && !i.checked);
      return `<div class="item">
        <span style="width:16px;flex-shrink:0"></span>
        <span class="item-name" style="color:var(--text-secondary)">${f.name}</span>
        ${state.activeStore === 'Vše' ? `<span class="item-store">${f.store}</span>` : ''}
        <button class="btn-fav active" onclick="toggleFav('${esc(f.name)}','${f.store}')" title="Odebrat z oblíbených">★</button>
        <button class="fav-add-btn" onclick="addFavToList('${esc(f.name)}','${f.store}')" ${inList ? 'disabled' : ''}>+ Přidat</button>
      </div>`;
    }).join('');
  } else {
    favSection.style.display = 'none';
  }
}

loadState();
</script>
</body>
</html>
